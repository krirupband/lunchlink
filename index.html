<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LunchLink Firebase</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f2fff2;
margin:0;
padding:0;
}

header{
background:#4CAF50;
color:white;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.container{
width:90%;
max-width:700px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input,textarea,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
}

button{
background:#4CAF50;
color:white;
padding:12px 20px;
border:none;
border-radius:10px;
margin-top:15px;
cursor:pointer;
}

.post{
background:#eaffea;
padding:15px;
border-radius:15px;
margin-top:15px;
}

img{
width:100%;
border-radius:10px;
margin-top:10px;
}
</style>
</head>
<body>

<header>
🍱 LunchLink
</header>

<div class="container">

<div class="card">
<h2>Upload Lunch</h2>

<input type="text" id="name" placeholder="Student Name">

<input type="text" id="class" placeholder="Class / Section">

<input type="text" id="food" placeholder="Food Name">

<select id="type">
<option>Veg</option>
<option>Non‑Veg</option>
</select>

<input type="text" id="allergy" placeholder="Allergy Warning">

<textarea id="details" placeholder="Extra Details"></textarea>

<input type="file" id="image">

<button onclick="uploadLunch()">Upload Lunch 🍱</button>
</div>

<div class="card">
<h2>Today's Lunches</h2>
<div id="posts"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB5AIOe7EVc9xGorfyBqT1Nr0mtgPDndXY",
  authDomain: "lunchlink-bff90.firebaseapp.com",
  projectId: "lunchlink-bff90",
  storageBucket: "lunchlink-bff90.firebasestorage.app",
  messagingSenderId: "1060082811917",
  appId: "1:1060082811917:web:5e8d3889f35016dba84144"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.uploadLunch = async function(){

let name = document.getElementById('name').value;
let studentClass = document.getElementById('class').value;
let food = document.getElementById('food').value;
let type = document.getElementById('type').value;
let allergy = document.getElementById('allergy').value;
let details = document.getElementById('details').value;

if(name === '' || food === ''){
alert('Fill all important details');
return;
}

await addDoc(collection(db,"lunches"),{
name,
studentClass,
food,
type,
allergy,
details
});

alert('Lunch Uploaded Successfully ✅');

loadLunches();
}

async function loadLunches(){

let posts = document.getElementById('posts');
posts.innerHTML = '';

const querySnapshot = await getDocs(collection(db,"lunches"));

querySnapshot.forEach((doc) => {

let data = doc.data();

let post = document.createElement('div');
post.classList.add('post');

post.innerHTML = `
<h3>${data.food}</h3>
<p><b>Student:</b> ${data.name}</p>
<p><b>Class:</b> ${data.studentClass}</p>
<p><b>Type:</b> ${data.type}</p>
<p><b>Allergy:</b> ${data.allergy}</p>
<p>${data.details}</p>

<button onclick="claimFood(this)">I Want This 🍱</button>
<button onclick="takeDownLunch(this)" style="background:red;">Take Down ❌</button>
`;

posts.prepend(post);
});
}

window.claimFood = function(button){

let answer = prompt('Enter your name to reserve this lunch:');

if(answer && answer.trim() !== ''){
button.innerHTML = `Reserved by ${answer} ✅`;
button.style.background = 'green';
button.disabled = true;
}
}

window.takeDownLunch = function(button){

let post = button.parentElement;

post.style.opacity = '0.5';

button.innerHTML = 'Lunch Removed ❌';

button.disabled = true;
}

loadLunches();

</script>

</body>
</html>
